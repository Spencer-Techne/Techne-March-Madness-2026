name: Update Tournament Scores

on:
  schedule:
    # Run every 15 minutes during game windows.
    # NCAA games typically tip from 12pm-10pm ET and finish by ~midnight ET.
    # UTC is ET+4 during EDT (March-April).
    - cron: '*/15 12-23 * 3 *'
    - cron: '*/15 0-4 * 3-4 *'
    - cron: '*/15 0-4 * 4 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and update scores
        run: node update-scores.js

      - name: Commit and push if changed
        run: |
          git config user.name "Score Bot"
          git config user.email "bot@technemedia.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No score changes detected"
          else
            git commit -m "🏀 Auto-update scores - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "Scores updated and pushed!"
          fi
